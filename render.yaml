databases:
  - name: laravel_db
    plan: free
    databaseName: laravel_db
    user: laravel_db_user

services:
  - type: web
    name: laravel_app
    plan: free
    runtime: docker
    dockerfilePath: Dockerfile

    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false

      - key: DATABASE_URL
        fromDatabase:
          name: laravel_db
          property: connectionString

      - key: DB_CONNECTION
        value: pgsql

      - key: LOG_CHANNEL
        value: stderr

      # Required by the richarvey/nginx-php-fpm image
      - key: WEBROOT
        value: /var/www/html/public
      - key: RUN_SCRIPTS
        value: "1"
      - key: REAL_IP_HEADER
        value: "1"
      - key: SKIP_COMPOSER
        value: "1"

